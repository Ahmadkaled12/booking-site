<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>موقع الحجز</title>

  <style>
    body{
      font-family: Arial;
      background:#f4f6f9;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      margin:0;
    }

    .box{
      background:white;
      padding:25px;
      border-radius:12px;
      width:300px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
      text-align:center;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:8px;
    }

    button{
      width:100%;
      padding:10px;
      background:#28a745;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#218838;
    }

    #bookingsList{
      width:300px;
      background:white;
      padding:15px;
      border-radius:12px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    .item{
      background:#f1f1f1;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      text-align:right;
    }

    .deleteBtn{
      background:red;
      margin-top:8px;
      font-size:14px;
    }
  </style>
</head>

<body>

<!-- نموذج الحجز -->
<div class="box">
  <h2>نظام الحجز</h2>

  <input id="name" placeholder="الاسم الكامل">
  <input id="date" type="date">

  <button onclick="addBooking()">احجز الآن</button>
</div>

<!-- عرض الحجوزات -->
<div id="bookingsList">
  <h3>📋 الحجوزات</h3>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCVJclfpEp9Jo9879C3RfZKiEdBUibwrxI",
    authDomain: "ahmad-662ee.firebaseapp.com",
    projectId: "ahmad-662ee",
    storageBucket: "ahmad-662ee.appspot.com",
    messagingSenderId: "740891153734",
    appId: "1:740891153734:web:b801aee7923287ef618147"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // إضافة حجز
  function addBooking() {
    const name = document.getElementById("name").value;
    const date = document.getElementById("date").value;

    if (!name || !date) {
      alert("يرجى تعبئة جميع الحقول");
      return;
    }

    db.collection("bookings").add({
      name,
      date,
      createdAt: new Date().toISOString()
    })
    .then(() => {
      alert("تم الحجز بنجاح ✅");
      document.getElementById("name").value = "";
      document.getElementById("date").value = "";
    })
    .catch(err => alert("خطأ: " + err));
  }

  // حذف حجز
  function deleteBooking(id) {
    if (!confirm("هل تريد حذف هذا الحجز؟")) return;

    db.collection("bookings").doc(id).delete()
      .then(() => {
        alert("تم الحذف ✅");
      });
  }

  // عرض الحجوزات
  function loadBookings() {
    db.collection("bookings")
      .orderBy("createdAt", "desc")
      .onSnapshot(snapshot => {
        const list = document.getElementById("bookingsList");
        list.innerHTML = "<h3>📋 الحجوزات</h3>";

        snapshot.forEach(doc => {
          const b = doc.data();

          list.innerHTML += `
            <div class="item">
              👤 ${b.name}<br>
              📅 ${b.date}<br>
              ⏱ ${b.createdAt}<br>

              <button class="deleteBtn" onclick="deleteBooking('${doc.id}')">
                حذف ❌
              </button>
            </div>
          `;
        });
      });
  }

  loadBookings();
</script>

</body>
</html>
